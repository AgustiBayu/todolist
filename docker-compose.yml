version: '3.8'

services:
  redis_cache:
    image: redis:7-alpine
    container_name: todolist_redis
    restart: always
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: todolist-app
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:    
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}      
    depends_on:
      - redis_cache

  tunnel:
    image: node:alpine
    container_name: todolist-tunnel
    # Menunggu app jalan baru buka tunnel
    command: sh -c "npm install -g localtunnel && lt --port 8080 --subdomain agusti-payment-dev --local-host app"
    depends_on:
      - app